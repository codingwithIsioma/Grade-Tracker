<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GradeTracker</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/6a9f6daa92.js"
      crossorigin="anonymous"
    ></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <h1><span>Grade</span> Tracker</h1>
      <!-- ADD Student section -->
      <section class="add-student">
        <div class="card">
          <p class="card-label">ADD STUDENT</p>
          <form id="student-form" action="">
            <div class="form-inputs">
              <label for="student-name"
                >Student Name<input
                  type="text"
                  name="student-name"
                  id="student-name"
                  placeholder="e.g. Joe Rogan"
              /></label>
              <label for="student-grade"
                >Grade<input
                  type="number"
                  name="student-grade"
                  id="student-grade"
                  placeholder="0 - 100"
              /></label>
            </div>
            <p class="error-message" id="error-message"></p>
            <button type="submit" id="submit-btn" class="submit-btn">
              Add Student
            </button>
          </form>
        </div>
      </section>

      <!-- Display Class Average as students are added and removed -->
      <section class="class-average">
        <div class="card">
          <p class="card-label">OVERVIEW</p>
          <div class="average">
            <p class="title">Average Grade</p>
            <p class="average-score"><span id="average-value">—</span> / 100</p>
          </div>
          <div class="distribution">
            <p class="card-label grade-distribution-label">
              GRADE DISTRIBUTION
            </p>
            <div class="grade-distribution">
              <div class="grade-distribution-item">
                <p class="grade-range">(0 - 49)</p>
                <div>
                  <p class="distribution-name">Fail</p>
                  <p id="fail-count" class="grade-count">0</p>
                </div>
              </div>
              <div class="grade-distribution-item">
                <p class="grade-range">(50 - 69)</p>
                <div>
                  <p class="distribution-name">Pass</p>
                  <p id="pass-count" class="grade-count">0</p>
                </div>
              </div>
              <div class="grade-distribution-item">
                <p class="grade-range">(70 - 84)</p>
                <div>
                  <p class="distribution-name">Merit</p>
                  <p id="merit-count" class="grade-count">0</p>
                </div>
              </div>
              <div class="grade-distribution-item">
                <p class="grade-range">(85 - 100)</p>
                <div>
                  <p class="distribution-name">Distinction</p>
                  <p id="distinction-count" class="grade-count">0</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Display Student List and remove student from list -->
      <section class="students-list">
        <div class="card">
          <div class="card-flex">
            <p class="card-label">STUDENTS</p>
            <div class="sort-buttons">
              <button id="sort-alphabetically">
                <i class="fa-solid fa-arrow-down-a-z"></i> A-Z
              </button>
              <button id="sort-by-highest-grade">
                <i class="fa-solid fa-arrow-down-9-1"></i> 9-0
              </button>
            </div>
          </div>
          <div class="list-container" id="list-container">
            <!-- display student list dynamically.-->
          </div>
          <div class="student-length">
            <p>
              <span id="student-count"></span>
              <span id="student"></span>
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
